    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        primary: 'rgb(var(--color-primary) / <alpha-value>)',
                        dark: '#212529',
                        darker: '#111418',
                        light: '#f8f9fa',
                        gray: {
                            400: '#adb5bd',
                            500: '#6c757d',
                            600: '#495057',

                        }
                    },
                    animation: {
                        'spin-slow': 'spin 15s linear infinite',

    <style>
        /* Theme Variables */
        :root { --color-primary: 245 223 78; } /* Default Yellow */
        .theme-yellow { --color-primary: 245 223 78; }
        .theme-blue { --color-primary: 59 130 246; }
        .theme-green { --color-primary: 16 185 129; }
        .theme-red { --color-primary: 239 68 68; }
        .theme-purple { --color-primary: 168 85 247; }

        .progress-bar-wrap {
            border-radius: 999px;
            height: 8px;
            overflow: hidden;
            margin-top: 0.5rem;
        }
        .progress-bar {
            background-color: rgb(var(--color-primary));
            height: 100%;
            border-radius: 999px;
        }
        
        details > summary { list-style: none; }
        details > summary::-webkit-details-marker { display: none; }
        details[open] summary ~ * { animation: sweep .3s ease-in-out; }
        @keyframes sweep {
            0% {opacity: 0; margin-top: -10px}
            100% {opacity: 1; margin-top: 0px}
        }
        
        .form-input-custom {
            border: none;
            border-bottom: 2px solid rgba(0,0,0,0.1);
            background: transparent;
            border-radius: 0;
            padding-left: 0;
            padding-right: 0;
            transition: all 0.3s;
        }
        .dark .form-input-custom {
            border-bottom-color: rgba(255,255,255,0.2);
            color: #f8f9fa;
        }
        .form-input-custom:focus {
            outline: none;
            box-shadow: none;
            border-color: #212529;
        }
        .dark .form-input-custom:focus {
            border-color: rgb(var(--color-primary));
        }

        .fade-in-up {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.7s ease-out, transform 0.7s ease-out;
        }
        .fade-in-up.visible {
            opacity: 1;
            transform: translateY(0);
        }
    </style>

        // Hamburger Menu Logic
        const menuBtn = document.getElementById('menu-btn');
        const closeBtn = document.getElementById('close-btn');
        const overlayMenu = document.getElementById('overlay-menu');
        const menuLinks = document.querySelectorAll('.menu-link');

        function openMenu() {
            overlayMenu.classList.remove('hidden');
            overlayMenu.classList.add('flex');
            setTimeout(() => {
                overlayMenu.classList.remove('opacity-0');
                overlayMenu.classList.add('opacity-100');
            }, 10);
            document.body.style.overflow = 'hidden'; 
        }

        function closeMenu() {
            overlayMenu.classList.remove('opacity-100');
            overlayMenu.classList.add('opacity-0');
            setTimeout(() => {
                overlayMenu.classList.add('hidden');
                overlayMenu.classList.remove('flex');
            }, 300);
            document.body.style.overflow = ''; 
        }

        menuBtn.addEventListener('click', openMenu);
        closeBtn.addEventListener('click', closeMenu);
        menuLinks.forEach(link => link.addEventListener('click', closeMenu));

        // Dark/Light Toggle Logic
        const themeToggle = document.getElementById('theme-toggle');
        themeToggle.addEventListener('click', () => {
            const html = document.documentElement;
            html.classList.toggle('dark');
            localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
        });

        // Scroll Spy for Menu Highlights
        const observerOptions = { root: null, rootMargin: '-50% 0px -50% 0px', threshold: 0 };
        const sectionObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const id = entry.target.getAttribute('id');
                    document.querySelectorAll('.menu-link').forEach(link => {
                        link.classList.remove('text-primary');
                        link.classList.add('text-white');
                        if (link.getAttribute('href') === `#${id}`) {
                            link.classList.remove('text-white');
                            link.classList.add('text-primary');
                        }
                    });
                }
            });
        }, observerOptions);
        document.querySelectorAll('section[id]').forEach(section => sectionObserver.observe(section));

        // Sticky Header Logic
        const header = document.getElementById('main-header');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                header.classList.add('bg-white', 'dark:bg-[#111418]', 'shadow-md', 'dark:shadow-gray-900', 'py-4');
                header.classList.remove('bg-transparent', 'py-6');
            } else {
                header.classList.add('bg-transparent', 'py-6');
                header.classList.remove('bg-white', 'dark:bg-[#111418]', 'shadow-md', 'dark:shadow-gray-900', 'py-4');
            }
        });

        // Typing Effect Logic
        const words = PORTFOLIO_DATA.hero.typedWords;
        let wordIndex = 0;
        let timer;
        const typedTextSpan = document.getElementById('typed-text');

        function typingEffect() {
            if(!words || words.length === 0) return;
            let word = words[wordIndex].split("");
            const loopTyping = function() {
                if (word.length > 0) {
                    typedTextSpan.innerHTML += word.shift();
                } else {
                    setTimeout(deletingEffect, 2000); 
                    return;
                }
                timer = setTimeout(loopTyping, 120); 
            };
            loopTyping();
        }

        function deletingEffect() {
            let word = words[wordIndex].split("");
            const loopDeleting = function() {
                if (word.length > 0) {
                    word.pop();
                    typedTextSpan.innerHTML = word.join("");
                } else {
                    wordIndex = (wordIndex + 1) % words.length; 
                    setTimeout(typingEffect, 500); 
                    return;
                }
                timer = setTimeout(loopDeleting, 60); 
            };
            loopDeleting();
        }
        typingEffect();

        // Scroll Reveal Animations Logic
        const animationObserver = new IntersectionObserver((entries, observer) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    observer.unobserve(entry.target); 
                }
            });
        }, { root: null, rootMargin: '0px', threshold: 0.15 });

        document.querySelectorAll('.fade-in-up').forEach(el => animationObserver.observe(el));

    </script>
